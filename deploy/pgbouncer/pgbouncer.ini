;; pgbouncer for NurtureHUB — transaction pooling in front of Postgres.
;;
;; Why: each app worker keeps its own SQLAlchemy pool. At ~50-60 workers that is
;; hundreds of would-be Postgres connections, well past Postgres's practical
;; ceiling. pgbouncer multiplexes many client connections down to a small set of
;; real server connections, so the app can scale out without exhausting Postgres.
;;
;; The app connects to pgbouncer (host=pgbouncer port=6432) instead of Postgres.
;; Point DATABASE_URL at it, e.g.
;;   postgresql://nurturehub:pass@pgbouncer:6432/nurturehub

[databases]
;; client db name  ->  real server. Add a *_ro line pointing at a read replica
;; and set the app's READ_DATABASE_URL to it to offload reference-data reads.
nurturehub = host=db port=5432 dbname=nurturehub

[pgbouncer]
listen_addr = 0.0.0.0
listen_port = 6432
auth_type = scram-sha-256
auth_file = /etc/pgbouncer/userlist.txt

;; Transaction pooling: a server connection is handed to a client only for the
;; duration of a transaction, then returned. This is what lets ~hundreds of app
;; clients share ~tens of server connections.
pool_mode = transaction

;; Real connections opened to Postgres. Keep default_pool_size * databases well
;; under Postgres max_connections (tune Postgres to e.g. 300).
max_client_conn = 2000
default_pool_size = 40
min_pool_size = 5
reserve_pool_size = 10
reserve_pool_timeout = 3
server_idle_timeout = 300

;; Transaction mode is incompatible with server-side prepared statements; the app
;; uses psycopg2 without them, so this is fine. If you switch to psycopg3, set
;; prepared_statements=false on the client side.
ignore_startup_parameters = extra_float_digits

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NurtureHUB — ICDS Assessment & Training Portal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Figtree:wght@500;600;700;800&family=Nunito+Sans:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <!-- Google Identity Services script for actual Google Sign-In -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>
  </head>
  <body>
    <!-- Pre-paint theme: avoids dark-mode flash. body.dark-mode is the
         legacy hook and is removed when the CSS migration completes. -->
    <script>
      (function () {
        var t = localStorage.getItem('nh_theme');
        var dark = t ? t === 'dark' : window.matchMedia('(prefers-color-scheme: dark)').matches;
        if (dark) {
          document.documentElement.classList.add('dark');
          document.body.classList.add('dark-mode');
        }
      })();
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
